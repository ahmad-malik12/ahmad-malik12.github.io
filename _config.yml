      description: |
      TradeUp is a stock trading simulation platform designed to provide users with a realistic, risk-free environment to learn and practice trading.

    The platform integrates real-time market data to simulate actual stock market behavior, allowing users to experience dynamic price movements without financial risk.

    It aims to enhance users’ understanding of trading strategies, improve decision-making skills, and build confidence through experiential learning.

